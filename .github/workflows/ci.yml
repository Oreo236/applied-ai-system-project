name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure .env is not tracked
        run: |
          if git ls-files --error-unmatch .env >/dev/null 2>&1; then
            echo ".env is tracked in the repository — remove it and use .gitignore.";
            git ls-files --error-unmatch .env;
            exit 1;
          else
            echo ".env not tracked — OK";
          fi

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          # Do not expose real secrets in CI; tests are deterministic
          GROQ_API_KEY: ''
        run: |
          PYTHONPATH=. pytest -q
  secrets-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install detect-secrets
        run: |
          python -m pip install --upgrade pip
          pip install detect-secrets

      - name: Run detect-secrets scan
        run: |
          detect-secrets scan --all-files --json > scan.json || true
          python - <<'PY'
import json, sys
data = json.load(open('scan.json'))
results = data.get('results', {})
if results:
    print('Potential secrets detected in the repository:')
    for fn, items in results.items():
        print(f" - {fn}: {len(items)} potential secret(s)")
    sys.exit(1)
else:
    print('No potential secrets detected by detect-secrets')
PY
